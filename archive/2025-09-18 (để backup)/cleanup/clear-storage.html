<!DOCTYPE html>
<html>
<head>
    <title>Clear Storage & Test Login</title>
</head>
<body>
    <h1>Clear Storage & Test Login</h1>
    <button onclick="clearStorage()">Clear LocalStorage</button>
    <button onclick="testLogin()">Test Login API</button>
    <div id="result"></div>

    <script>
        function clearStorage() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            document.getElementById('result').innerHTML = '<p style="color: green;">✅ Cleared token and user from localStorage</p>';
        }

        async function testLogin() {
            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        maso: '2021003',
                        password: 'Student@123'
                    })
                });

                const data = await response.json();
                
                if (response.ok) {
                    document.getElementById('result').innerHTML = 
                        `<p style="color: green;">✅ Login Success!</p>
                         <p>Token: ${data.data.token.substring(0, 20)}...</p>
                         <p>User: ${data.data.user.ho_ten}</p>`;
                    
                    // Save to localStorage
                    localStorage.setItem('token', data.data.token);
                    localStorage.setItem('user', JSON.stringify(data.data.user));
                } else {
                    document.getElementById('result').innerHTML = 
                        `<p style="color: red;">❌ Login Failed: ${data.message}</p>`;
                }
            } catch (error) {
                document.getElementById('result').innerHTML = 
                    `<p style="color: red;">❌ Error: ${error.message}</p>`;
            }
        }
    </script>
</body>
</html>
