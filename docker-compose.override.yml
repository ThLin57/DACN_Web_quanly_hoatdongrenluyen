services:
  # Keep the production app disabled by default via profiles
  app:
    profiles:
      - prod

  backend-dev:
    image: node:18-alpine
    container_name: dacn_backend_dev
    working_dir: /app
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://admin:abc@db:5432/Web_QuanLyDiemRenLuyen?schema=public
      JWT_SECRET: supersecret_in_docker_change_me
      JWT_EXPIRES_IN: 1d
      # Allow CRA (http://localhost:3000) to call API
      CORS_ORIGIN: http://localhost:3000
      # Improve file watching in Docker on Windows
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    depends_on:
      - db
    ports:
      - "3001:3001"
    networks:
      - dacn_network
    command: sh -lc "npm install && npx prisma generate || true && npm run dev"

  frontend-dev:
    image: node:18-alpine
    container_name: dacn_frontend_dev
    working_dir: /app
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      BROWSER: "none"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend-dev
    ports:
      - "3000:3000"
    networks:
      - dacn_network
    command: sh -lc "npm install && npm start"

volumes:
  backend_node_modules:
  frontend_node_modules:
